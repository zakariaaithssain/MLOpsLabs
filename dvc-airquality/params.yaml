prepare:
  test_size: 0.2
  val_size: 0.1
  random_state: 42
  target_col: CO(GT)
  missing_value: -200    
  co_high_threshold: 2.0  

featurize:
  normalize: true        
  drop_na_rows: true     
  add_time_features: true 

train:
  n_estimators: 100
  max_depth: 8
  min_samples_split: 4
  random_state: 42

evaluate:
  threshold: 0.80          
